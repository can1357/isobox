name: CI

on:
  push:
    branches: [main]
  pull_request:
  schedule:
    # Weekly run so newly disclosed dependency vulnerabilities surface even
    # without a code change.
    - cron: "0 6 * * 1"

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  GOLANGCI_LINT_VERSION: v2.12.2
  CLANG_FORMAT_VERSION: "20.1.7"

jobs:
  test:
    name: Test (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Build CLI
        run: just build

      - name: Run Go tests
        run: just test

  race:
    name: Race detector
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Run Go tests under the race detector
        run: just test-race

  lint:
    name: Lint & format
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Install golangci-lint
        run: |
          curl -sSfL https://raw.githubusercontent.com/golangci/golangci-lint/HEAD/install.sh \
            | sh -s -- -b "$(go env GOPATH)/bin" "${GOLANGCI_LINT_VERSION}"

      - name: Install clang-format
        run: pipx install "clang-format==${CLANG_FORMAT_VERSION}"

      - name: Check formatting (gofmt + clang-format)
        run: just fmt-check

      - name: Verify module graph is tidy
        run: |
          go mod tidy
          git diff --exit-code -- go.mod go.sum

      - name: Lint (all GOOS)
        run: just lint-all

  govulncheck:
    name: Vulnerabilities
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version-file: go.mod
          cache: true

      - name: Install govulncheck
        run: go install golang.org/x/vuln/cmd/govulncheck@latest

      - name: Scan for known vulnerabilities
        run: just vuln

  isoboxfs:
    name: isoboxfs C preload
    runs-on: ubuntu-latest
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up just
        uses: extractions/setup-just@v3

      - name: Build C preload
        run: just isoboxfs-build

      - name: Run C preload tests
        run: just isoboxfs-test
